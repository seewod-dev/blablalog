name: CI/CD
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
permissions:
  contents: read
  packages: write
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compute lowercase image name
        run: echo "IMAGE_NAME_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ github.sha }}
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compute lowercase image name
        run: echo "IMAGE_NAME_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - name: Prepare remote directories
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            sudo mkdir -p /opt/blablalog/runtime/avataruploads
            sudo mkdir -p /opt/blablalog/runtime/coverImg_uploads
            sudo mkdir -p /opt/blablalog/runtime/photo
            sudo mkdir -p /opt/blablalog/runtime/projects
            sudo mkdir -p /opt/blablalog
      - name: Upload docker-compose.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "deploy/docker-compose.yml"
          target: "/opt/blablalog/"
          strip_components: 1
      - name: Write .env to server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cat > /opt/blablalog/.env << 'EOF'
            NODE_ENV=production
            PORT=3000
            INFRA_NETWORK_NAME=${{ secrets.INFRA_NETWORK_NAME }}
            MONGO_URI=${{ secrets.MONGO_URI }}
            MONGO_HOST=mongo
            MONGO_PORT=${{ secrets.MONGO_PORT }}
            MONGO_AUTH_SOURCE=${{ secrets.MONGO_AUTH_SOURCE }}
            MONGO_DBNAME=${{ secrets.MONGO_DBNAME }}
            MONGO_USER=${{ secrets.MONGO_USER }}
            MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_SECURE=${{ secrets.SMTP_SECURE }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            SMTP_FROM=${{ secrets.SMTP_FROM }}
            MINIO_ENDPOINT=${{ secrets.MINIO_ENDPOINT }}
            MINIO_PORT=${{ secrets.MINIO_PORT }}
            MINIO_USE_SSL=${{ secrets.MINIO_USE_SSL }}
            MINIO_ACCESS_KEY=${{ secrets.MINIO_ACCESS_KEY }}
            MINIO_SECRET_KEY=${{ secrets.MINIO_SECRET_KEY }}
            MINIO_BUCKET=${{ secrets.MINIO_BUCKET }}
            MINIO_PHOTO_PATH=${{ secrets.MINIO_PHOTO_PATH }}
            HEFENG_PRIVATE_KEY_BASE64=${{ secrets.HEFENG_PRIVATE_KEY_BASE64 }}
            HEFENG_KID=${{ secrets.HEFENG_KID }}
            HEFENG_SUB=${{ secrets.HEFENG_SUB }}
            EOF
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 30m  # 增加超时时间到30分钟
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            export APP_IMAGE=ghcr.io/${{ env.IMAGE_NAME_LC }}:latest
            NET="${{ secrets.INFRA_NETWORK_NAME }}"
            if [ -z "$NET" ]; then NET="apps"; fi
            docker network inspect "$NET" >/dev/null 2>&1 || docker network create "$NET"
            export INFRA_NETWORK_NAME="$NET"
            if [ -n '${{ secrets.MONGO_URI }}' ]; then
              export MONGO_URI='${{ secrets.MONGO_URI }}'
            fi
            export MONGO_USER='${{ secrets.MONGO_USER }}'
            export MONGO_PASSWORD='${{ secrets.MONGO_PASSWORD }}'
            export MONGO_AUTH_SOURCE='${{ secrets.MONGO_AUTH_SOURCE }}'
            export MONGO_PORT='${{ secrets.MONGO_PORT }}'
            export MONGO_DBNAME='${{ secrets.MONGO_DBNAME }}'
            docker compose -f /opt/blablalog/docker-compose.yml pull
            docker compose -f /opt/blablalog/docker-compose.yml up -d
            docker image prune -f
