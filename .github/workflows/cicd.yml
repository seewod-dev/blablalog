name: CI/CD
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
permissions:
  contents: read
  packages: write
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compute lowercase image name
        run: echo "IMAGE_NAME_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ github.sha }}
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compute lowercase image name
        run: echo "IMAGE_NAME_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - name: Prepare remote directories
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            sudo mkdir -p /opt/blablalog/runtime/avataruploads
            sudo mkdir -p /opt/blablalog/runtime/coverImg_uploads
            sudo mkdir -p /opt/blablalog/runtime/photo
            sudo mkdir -p /opt/blablalog/runtime/projects
            sudo mkdir -p /opt/blablalog
      - name: Upload docker-compose.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "deploy/docker-compose.yml"
          target: "/opt/blablalog/"
          strip_components: 1
      - name: Write .env to server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            FILE=/opt/blablalog/.env
            rm -f "$FILE"
            put() { k="$1"; v="$2"; if [ -n "$v" ]; then case "$v" in *=*) v="${v#*=}";; esac; printf "%s=%s\n" "$k" "$v" >> "$FILE"; fi }
            put NODE_ENV '${{ vars.NODE_ENV || 'production' }}'
            put PORT '${{ vars.PORT || '3000' }}'
            NET="${{ secrets.INFRA_NETWORK_NAME || vars.INFRA_NETWORK_NAME }}"; if [ -z "$NET" ]; then NET="apps"; fi; put INFRA_NETWORK_NAME "$NET"
            put MONGO_URI '${{ secrets.MONGO_URI || vars.MONGO_URI }}'
            put MONGO_HOST '${{ secrets.MONGO_HOST || vars.MONGO_HOST || 'mongo' }}'
            put MONGO_PORT '${{ secrets.MONGO_PORT || vars.MONGO_PORT || '27017' }}'
            put MONGO_AUTH_SOURCE '${{ secrets.MONGO_AUTH_SOURCE || vars.MONGO_AUTH_SOURCE || 'admin' }}'
            put MONGO_DBNAME '${{ secrets.MONGO_DBNAME || vars.MONGO_DBNAME || 'BlaBlaLog' }}'
            put MONGO_USER '${{ secrets.MONGO_USER || vars.MONGO_USER }}'
            put MONGO_PASSWORD '${{ secrets.MONGO_PASSWORD || vars.MONGO_PASSWORD }}'
            put JWT_SECRET '${{ secrets.JWT_SECRET || vars.JWT_SECRET }}'
            put SMTP_HOST '${{ secrets.SMTP_HOST || vars.SMTP_HOST }}'
            put SMTP_PORT '${{ secrets.SMTP_PORT || vars.SMTP_PORT }}'
            put SMTP_SECURE '${{ secrets.SMTP_SECURE || vars.SMTP_SECURE }}'
            put SMTP_USER '${{ secrets.SMTP_USER || vars.SMTP_USER }}'
            put SMTP_PASS '${{ secrets.SMTP_PASS || vars.SMTP_PASS }}'
            put SMTP_FROM '${{ secrets.SMTP_FROM || vars.SMTP_FROM }}'
            put MINIO_ENDPOINT '${{ secrets.MINIO_ENDPOINT || vars.MINIO_ENDPOINT }}'
            put MINIO_PORT '${{ secrets.MINIO_PORT || vars.MINIO_PORT }}'
            put MINIO_USE_SSL '${{ secrets.MINIO_USE_SSL || vars.MINIO_USE_SSL }}'
            put MINIO_ACCESS_KEY '${{ secrets.MINIO_ACCESS_KEY || vars.MINIO_ACCESS_KEY }}'
            put MINIO_SECRET_KEY '${{ secrets.MINIO_SECRET_KEY || vars.MINIO_SECRET_KEY }}'
            put MINIO_BUCKET '${{ secrets.MINIO_BUCKET || vars.MINIO_BUCKET }}'
            put MINIO_PHOTO_PATH '${{ secrets.MINIO_PHOTO_PATH || vars.MINIO_PHOTO_PATH }}'
            put HEFENG_PRIVATE_KEY_BASE64 '${{ secrets.HEFENG_PRIVATE_KEY_BASE64 || vars.HEFENG_PRIVATE_KEY_BASE64 }}'
            put HEFENG_KID '${{ secrets.HEFENG_KID || vars.HEFENG_KID }}'
            put HEFENG_SUB '${{ secrets.HEFENG_SUB || vars.HEFENG_SUB }}'
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 30m  # 增加超时时间到30分钟
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            NET="${{ secrets.INFRA_NETWORK_NAME || vars.INFRA_NETWORK_NAME }}"
            if [ -z "$NET" ]; then NET="apps"; fi
            docker network inspect "$NET" >/dev/null 2>&1 || docker network create "$NET"
            docker compose -f /opt/blablalog/docker-compose.yml pull
            docker compose -f /opt/blablalog/docker-compose.yml up -d
            docker image prune -f
