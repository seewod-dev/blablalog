name: CI/CD
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
permissions:
  contents: read
  packages: write
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compute lowercase image name
        run: echo "IMAGE_NAME_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ github.sha }}
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compute lowercase image name
        run: echo "IMAGE_NAME_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - name: Prepare remote directories
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            sudo mkdir -p /opt/blablalog/runtime/avataruploads
            sudo mkdir -p /opt/blablalog/runtime/coverImg_uploads
            sudo mkdir -p /opt/blablalog/runtime/photo
            sudo mkdir -p /opt/blablalog/runtime/projects
            sudo mkdir -p /opt/blablalog
      - name: Upload docker-compose.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "deploy/docker-compose.yml"
          target: "/opt/blablalog/"
          strip_components: 1
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 30m  # 增加超时时间到30分钟
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            export APP_IMAGE=ghcr.io/${{ env.IMAGE_NAME_LC }}:latest
            NET="${{ secrets.INFRA_NETWORK_NAME }}"
            if [ -z "$NET" ]; then NET="apps"; fi
            docker network inspect "$NET" >/dev/null 2>&1 || docker network create "$NET"
            export INFRA_NETWORK_NAME="$NET"
            export MONGO_USER='${{ secrets.MONGO_USER }}'
            export MONGO_PASSWORD='${{ secrets.MONGO_PASSWORD }}'
            export MONGO_AUTH_SOURCE='${{ secrets.MONGO_AUTH_SOURCE }}'
            export MONGO_PORT='${{ secrets.MONGO_PORT }}'
            export MONGO_DBNAME='${{ secrets.MONGO_DBNAME }}'
            docker compose -f /opt/blablalog/docker-compose.yml pull
            docker compose -f /opt/blablalog/docker-compose.yml up -d
            docker image prune -f
