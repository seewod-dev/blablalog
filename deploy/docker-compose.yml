name: blablalog
services:
  app:
    image: ghcr.io/seewod-dev/blablalog:latest
    container_name: blablalog-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_HOST=mongo  # 使用服务名访问MongoDB
      - MONGO_URI=${MONGO_URI}
      - MONGO_USER=${MONGO_USER}
      - MONGO_PASSWORD=${MONGO_PASSWORD}
      - MONGO_AUTH_SOURCE=${MONGO_AUTH_SOURCE:-admin}
      - MONGO_PORT=${MONGO_PORT:-27017}
      - MONGO_DBNAME=${MONGO_DBNAME:-BlaBlaLog}
    volumes:
      - /opt/blablalog/runtime/avataruploads:/workspace/back-end/public/avataruploads
      - /opt/blablalog/runtime/coverImg_uploads:/workspace/back-end/public/coverImg_uploads
      - /opt/blablalog/runtime/photo:/workspace/back-end/public/photo
      - /opt/blablalog/runtime/projects:/workspace/back-end/public/projects
    networks:
      apps:
        aliases:
          - blablalog-app

networks:
  apps:
    name: ${INFRA_NETWORK_NAME:-apps}
    external: true
