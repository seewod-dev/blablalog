name: blablalog
services:
  app:
    image: ${APP_IMAGE}
    container_name: blablalog-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_HOST=mongo  # 使用服务名访问MongoDB
    volumes:
      - /opt/blablalog/runtime/avataruploads:/workspace/back-end/public/avataruploads
      - /opt/blablalog/runtime/coverImg_uploads:/workspace/back-end/public/avataruploads
      - /opt/blablalog/runtime/photo:/workspace/back-end/public/photo
      - /opt/blablalog/runtime/proprojects:/workspace/back-end/public/projects
    networks:
      - infra

networks:
  infra:
    name: infra
    external: true
